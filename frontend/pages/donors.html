<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donor Registration</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="../index.html">Home</a>
      <a href="./recipients.html">Recipient Page</a>
      <a href="./admin.html">Admin Dashboard</a>
    </div>

    <div class="card">
      <h1>Donor Registration</h1>
      <form id="donorForm">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required />
        </div>

        <div>
          <label for="age">Age</label>
          <input id="age" name="age" type="number" min="18" required />
        </div>

        <div>
          <label for="bloodGroup">Blood Group</label>
          <select id="bloodGroup" name="bloodGroup" required>
            <option value="">Select</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>

        <div>
          <label for="organ">Organ</label>
          <input id="organ" name="organ" type="text" placeholder="Kidney" required />
        </div>

        <div>
          <label for="location">Location</label>
          <input id="location" name="location" type="text" required />
        </div>

        <button type="submit">Register Donor</button>
      </form>
      <p id="donorMessage" class="message"></p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
