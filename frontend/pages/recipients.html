<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipient Registration</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="../index.html">Home</a>
      <a href="./donors.html">Donor Page</a>
      <a href="./admin.html">Admin Dashboard</a>
    </div>

    <div class="card">
      <h1>Recipient Registration</h1>
      <form id="recipientForm">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required />
        </div>

        <div>
          <label for="age">Age</label>
          <input id="age" name="age" type="number" min="1" required />
        </div>

        <div>
          <label for="bloodGroup">Blood Group</label>
          <select id="bloodGroup" name="bloodGroup" required>
            <option value="">Select</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>

        <div>
          <label for="requiredOrgan">Required Organ</label>
          <input id="requiredOrgan" name="requiredOrgan" type="text" placeholder="Kidney" required />
        </div>

        <div>
          <label for="urgency">Urgency</label>
          <select id="urgency" name="urgency" required>
            <option value="">Select</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
          </select>
        </div>

        <button type="submit">Register Recipient</button>
      </form>
      <p id="recipientMessage" class="message"></p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
